<main class="app-shell">
  <header class="toolbar">
    <div>
      <p class="eyebrow">{{ dataset() }}.json</p>
      <h1>{{ viewerTitle() }}</h1>
    </div>

    <div class="toolbar-actions">
      <a class="home-link" [routerLink]="homeRoute()">Datasets</a>
      <button class="back-button" type="button" [disabled]="currentPath().length <= 1" (click)="goBack()">
        Back
      </button>
    </div>
  </header>

  <nav class="breadcrumb" aria-label="Current node path" *ngIf="currentPath().length > 0">
    <button
      class="crumb"
      type="button"
      *ngFor="let segment of currentPath(); let index = index"
      [disabled]="index === currentPath().length - 1"
      (click)="onBreadcrumbClick(index)"
    >
      {{ segment }}
    </button>
  </nav>

  <section class="viewer" *ngIf="renderTree() as tree; else loadingState">
    <div
      class="root-box"
      [class.root-box--image-map]="!!tree.imageMap"
      [class.transition-mode]="mode() === 'domtransition'"
      [class.parent-fading]="parentFading()"
    >
      <span class="box-label">{{ tree.id }}</span>

      <ng-container *ngIf="tree.children.length > 0; else emptyState">
        <div class="image-map-panel" *ngIf="tree.imageMap as im; else classicChildren">
          <svg
            class="image-map-svg"
            [attr.viewBox]="'0 0 ' + im.viewWidth + ' ' + im.viewHeight"
            preserveAspectRatio="xMidYMax meet"
            role="group"
            [attr.aria-label]="'Interactive map for ' + tree.id"
          >
            <image
              class="image-map-photo"
              [attr.href]="im.imageUrl"
              x="0"
              y="0"
              [attr.width]="im.viewWidth"
              [attr.height]="im.viewHeight"
              preserveAspectRatio="xMidYMax meet"
              tabindex="-1"
            />
            <g
              *ngFor="let zone of visibleZones(im); let zIndex = index; trackBy: trackByZoneChildId"
              class="image-map-zone-group animate__animated animate__bounceIn"
              [class.transition-sibling-fade]="zoneSiblingFadeActive(zone)"
              [style.--child-index]="zIndex"
            >
              <polygon
                class="image-map-zone"
                [attr.points]="zone.pointsAttr"
                [attr.aria-label]="zone.child.id"
                role="button"
                tabindex="0"
                [attr.title]="zone.tooltip"
                [class.transition-source]="isTransitioningChild(zone.child)"
                (click)="onImageZoneClick($event, zone.child)"
                (keydown)="onImageZoneKeydown($event, zone.child)"
              />
              <text
                class="image-map-zone-label"
                pointer-events="none"
                [attr.x]="zone.labelCenterX"
                [attr.y]="zone.labelCenterY"
                text-anchor="middle"
                dominant-baseline="middle"
                [attr.font-size]="imageMapLabelFont(im.viewWidth)"
              >
                {{ zone.child.id }}
              </text>
            </g>
          </svg>
        </div>
        <ng-template #classicChildren>
          <div class="children-row">
            <button
              class="child-box animate__animated animate__bounceIn"
              type="button"
              *ngFor="let child of visibleChildren(tree); let index = index; trackBy: trackById"
              [style.--child-index]="index"
              [class.child-box-has-preview]="childHasImagePreview(child)"
              [class.transition-sibling-fade]="siblingFadeActive(child)"
              [class.transition-source]="isTransitioningChild(child)"
              (click)="onNodeClick($event, child)"
              (keydown)="onNodeKeydown($event, child)"
            >
              <svg
                *ngIf="imagePreviewForNode(child) as pv"
                class="child-preview-svg"
                [attr.viewBox]="'0 0 ' + pv.viewWidth + ' ' + pv.viewHeight"
                preserveAspectRatio="xMidYMax meet"
                aria-hidden="true"
              >
                <image
                  class="child-preview-photo"
                  [attr.href]="pv.href"
                  x="0"
                  y="0"
                  [attr.width]="pv.viewWidth"
                  [attr.height]="pv.viewHeight"
                  preserveAspectRatio="xMidYMax meet"
                  tabindex="-1"
                />
              </svg>
              <span class="child-box-label">{{ child.id }}</span>
            </button>
          </div>
        </ng-template>
      </ng-container>
    </div>
  </section>

  <div
    class="transition-clone"
    *ngIf="transitionClone() as clone"
    [class.transition-clone-has-preview]="clone.preview"
    [ngStyle]="clone.style"
  >
    <svg
      *ngIf="clone.preview as p"
      class="transition-clone-preview-svg"
      [attr.viewBox]="'0 0 ' + p.viewWidth + ' ' + p.viewHeight"
      preserveAspectRatio="xMidYMax meet"
      aria-hidden="true"
    >
      <image
        class="transition-clone-preview-photo"
        [attr.href]="p.href"
        x="0"
        y="0"
        [attr.width]="p.viewWidth"
        [attr.height]="p.viewHeight"
        preserveAspectRatio="xMidYMax meet"
        tabindex="-1"
      />
    </svg>
    <span class="transition-clone-label" [ngStyle]="clone.labelStyle">
      {{ clone.id }}
    </span>
  </div>
</main>

<ng-template #loadingState>
  <section class="state">
    {{ errorMessage() || 'Loading ' + dataset() + '.json...' }}
  </section>
</ng-template>

<ng-template #emptyState>
  <p class="empty-state">This node has no children.</p>
</ng-template>
