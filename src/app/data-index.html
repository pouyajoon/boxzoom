<main class="app-shell">
  <section class="home-panel">
    <p class="eyebrow">Boxzoom</p>
    <h1>
      {{
        mode() === 'root'
          ? 'Choose a viewer'
          : mode() === 'domtransition'
            ? 'DOM transition datasets'
            : 'Simple DOM datasets'
      }}
    </h1>

    <div class="route-list">
      <a class="route-card" *ngFor="let route of routes()" [routerLink]="route.path">
        <span>{{ route.label }}</span>
        <small>{{ route.path }}</small>
      </a>
    </div>
  </section>
</main>
